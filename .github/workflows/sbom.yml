name: Task E — Supply Chain Audit (SBOM)

on:
  push:
    branches:
      - "main"
      - "master"

jobs:
  generate-sbom:
    name: Build Container and Generate SBOM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t temp-target:latest ./task-e

      - name: Generate CycloneDX SBOM with Anchore Syft
        uses: anchore/sbom-action@v0
        with:
          image: "temp-target:latest"
          format: "cyclonedx-json"
          output-file: "sbom.json"

      - name: Verify SBOM generation
        run: |
          ls -lah
          head -20 sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: cyclonedx-sbom
          path: sbom.json

  scan-sbom:
    name: Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    needs: generate-sbom

    steps:
      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: cyclonedx-sbom
          path: ./sbom-artifact

      - name: Verify downloaded SBOM
        run: |
          echo "Downloaded files:"
          ls -R ./sbom-artifact

          echo "Preview:"
          head -20 ./sbom-artifact/sbom.json

      - name: Scan SBOM for CVEs with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: "sbom"
          scan-ref: "./sbom-artifact/sbom.json"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"