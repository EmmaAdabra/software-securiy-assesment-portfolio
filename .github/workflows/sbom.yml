name: Task E — Supply Chain Audit (SBOM)

on:
  push:
    branches: [ "main", "master" ]

jobs:
  generate-sbom:
    name: Build Container and Generate SBOM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t temp-target:latest ./task-e

      - name: Generate CycloneDX SBOM with Anchore Syft
        uses: anchore/sbom-action@v0
        with:
          image: "temp-target:latest"
          format: "cyclonedx-json"
          output-file: "sbom.json"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: cyclonedx-sbom
          path: sbom.json

# Add a Trivy job to the workflow
scan-sbom:
    name: Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    needs: generate-sbom

    steps:
      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: cyclonedx-sbom

      - name: Scan SBOM for CVEs with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "sbom"
          input: "sbom.json"
          format: "table"
          exit-code: "0"          # Set to "1" to break the build on CRITICAL findings
          severity: "CRITICAL,HIGH"